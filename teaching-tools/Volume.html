<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 石頭體積與水位變化教學動畫</title>
    <style>
        :root {
            --tank-border: rgba(100, 120, 140, 0.6);
            --tank-bg: rgba(255, 255, 255, 0.1);
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        .container-wrapper {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 900px;
        }

        /* 3D 視角場景設定 */
        .simulation-area {
            position: relative;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            perspective: 1000px; /* 創造 3D 景深 */
        }

        /* 3D 容器本體 */
        .tank-3d {
            position: relative;
            width: 200px;
            height: 300px;
            transform-style: preserve-3d;
            /* 設定初始觀看角度 */
            transform: rotateX(-10deg) rotateY(-25deg);
            transition: transform 0.5s ease;
        }

        /* 讓學生可以稍微轉動視角 */
        .simulation-area:hover .tank-3d {
            transform: rotateX(-15deg) rotateY(-35deg);
        }

        /* 容器的各個面 */
        .wall {
            position: absolute;
            background: var(--tank-bg);
            border: 2px solid var(--tank-border);
            box-sizing: border-box;
        }
        .wall.back {
            width: 200px; height: 300px;
            transform: translateZ(-50px);
            /* 背面加上刻度線：每 50px (代表 5cm) 畫一條線 */
            background: repeating-linear-gradient(to top, transparent, transparent 48px, rgba(0,0,0,0.2) 48px, rgba(0,0,0,0.2) 50px);
        }
        .wall.left {
            width: 100px; height: 300px;
            left: 50px;
            transform: rotateY(-90deg) translateZ(100px);
        }
        .wall.right {
            width: 100px; height: 300px;
            left: 50px;
            transform: rotateY(90deg) translateZ(100px);
        }
        .wall.bottom {
            width: 200px; height: 100px;
            top: 100px;
            transform: rotateX(-90deg) translateZ(150px);
            background: rgba(100, 120, 140, 0.8);
        }
        .wall.front {
            width: 200px; height: 300px;
            transform: translateZ(50px);
            border: 2px solid rgba(100, 120, 140, 0.3);
            background: transparent; /* 前方保持全透明以利觀察 */
        }

        /* 水體積共通設定 (由前、右、上三個面組成) */
        .water-volume {
            position: absolute;
            width: 200px;
            bottom: 0;
            left: 0;
            transform-style: preserve-3d;
        }
        .w-face { position: absolute; box-sizing: border-box; }
        .w-front { width: 200px; height: 100%; background: var(--w-color); transform: translateZ(49px); } /* 稍微內縮避免穿圖 */
        .w-right { width: 100px; height: 100%; background: var(--w-dark); left: 50px; transform: rotateY(90deg) translateZ(99px); }
        .w-top { width: 200px; height: 100px; background: var(--w-light); top: 0; transform: translateY(-50px) rotateX(90deg); border: 1px solid rgba(255,255,255,0.3); }

        /* 底部的 15cm 水 */
        .base-water {
            height: 150px;
            --w-color: rgba(77, 166, 255, 0.6);
            --w-dark: rgba(50, 140, 230, 0.6);
            --w-light: rgba(120, 200, 255, 0.7);
        }

        /* 會變化的那 5cm 水 (初始假裝是原本的水，後來變成橘色補水) */
        .displaced-water {
            bottom: 150px; /* 疊在底水之上 */
            height: 50px;
            --w-color: rgba(77, 166, 255, 0.6);
            --w-dark: rgba(50, 140, 230, 0.6);
            --w-light: rgba(120, 200, 255, 0.7);
        }
        /* 補水時切換成橘色 */
        .displaced-water.orange-mode {
            --w-color: rgba(255, 153, 0, 0.7);
            --w-dark: rgba(230, 130, 0, 0.7);
            --w-light: rgba(255, 180, 50, 0.8);
            box-shadow: 0 0 20px rgba(255,153,0,0.4);
        }

        /* 空缺空間的虛線框 */
        .empty-outline {
            position: absolute;
            width: 200px;
            height: 50px;
            bottom: 150px;
            transform-style: preserve-3d;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .empty-outline .w-front { background: rgba(0,0,0,0.02); border: 2px dashed #888; transform: translateZ(51px); }
        .empty-outline .w-right { background: rgba(0,0,0,0.02); border: 2px dashed #888; left: 50px; transform: rotateY(90deg) translateZ(101px); }

        /* 3D 石頭 */
        .stone-3d {
            position: absolute;
            width: 90px;
            height: 60px;
            bottom: 10px;
            left: 55px;
            /* 利用漸層製造立體感 */
            background: radial-gradient(circle at 30% 30%, #b3b3b3, #555);
            border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
            /* 將石頭往容器中間推 */
            transform: translateZ(0px) rotateY(-20deg); 
            box-shadow: 10px 10px 15px rgba(0,0,0,0.5);
            transition: bottom 1.5s ease, opacity 0.5s ease, transform 1.5s ease;
        }

        /* 刻度文字 (放在左側牆面旁邊) */
        .scale-labels {
            position: absolute;
            left: -40px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-weight: bold;
            color: #555;
            transform: translateZ(50px);
        }
        
        /* 控制面板區 (同前一版) */
        .control-panel { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 20px; }
        .step-info { font-size: 1.1em; margin-bottom: 20px; font-weight: 500; }
        .step-info .highlight { font-weight: bold; color: #0066cc; }
        .buttons { display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 24px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: bold; touch-action: manipulation; }
        button:active { transform: scale(0.98); }
        .btn-blue { background-color: #e6f0ff; color: #0066cc; }
        .btn-blue:hover { background-color: #cce0ff; }
        .btn-blue:disabled { background-color: #ddd; color: #888; cursor: not-allowed; }
        .btn-orange { background-color: #fff9e6; color: #cc7a00; border: 2px solid #cc7a00; }
        .btn-orange:active { background-color: #ffe6b3; }
        .btn-orange:disabled { background-color: #ddd; color: #888; cursor: not-allowed; border: none; }
        .btn-reset { background-color: #ffe6e6; color: #cc0000; }
        .formula-display { margin-top: 20px; background-color: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display: none; text-align: left; }
        .formula-display p { margin: 5px 0; font-size: 0.95em; }
        .formula-display .final-result { font-size: 1.1em; font-weight: bold; color: #009933; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container-wrapper">
    <div class="simulation-area">
        <div class="tank-3d">
            <div class="wall back"></div>
            <div class="wall left"></div>
            <div class="wall bottom"></div>
            <div class="wall right"></div>

            <div class="water-volume base-water">
                <div class="w-face w-front"></div>
                <div class="w-face w-right"></div>
                <div class="w-face w-top"></div>
            </div>

            <div class="empty-outline" id="emptyOutline">
                <div class="w-face w-front"></div>
                <div class="w-face w-right"></div>
            </div>

            <div class="water-volume displaced-water" id="displacedWater">
                <div class="w-face w-front"></div>
                <div class="w-face w-right"></div>
                <div class="w-face w-top"></div>
            </div>

            <div class="stone-3d" id="stone"></div>
            
            <div class="wall front"></div>

            <div class="scale-labels">
                <div>30</div>
                <div>25</div>
                <div>20</div>
                <div>15</div>
                <div>10</div>
                <div>5</div>
                <div>0</div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="step-info" id="stepInfo">
            觀察初始狀態：<span class="highlight">水 + 石頭 = 20 cm</span> <br>
            <span style="font-size: 0.85em; color: #666;">（💡 提示：滑鼠游標移到容器上，可以切換觀看視角喔！）</span>
        </div>
        
        <div class="buttons">
            <button class="btn-blue" id="btnRemoveStone" onclick="removeStone()">1. 拿出石頭</button>
            <button class="btn-orange" id="btnAddWater">2. 長按補水（看體積）</button>
            <button class="btn-reset" onclick="reset()">重置</button>
        </div>

        <div class="formula-display" id="formulaDisplay">
            <p><strong>體積連結：</strong></p>
            <p id="formula1"></p>
            <p id="formula2"></p>
            <div class="final-result" id="finalResult"></div>
        </div>
    </div>
</div>

<script>
    const displacedWater = document.getElementById('displacedWater');
    const emptyOutline = document.getElementById('emptyOutline');
    const stone = document.getElementById('stone');
    const stepInfo = document.getElementById('stepInfo');
    const btnRemoveStone = document.getElementById('btnRemoveStone');
    const btnAddWater = document.getElementById('btnAddWater');
    const formulaDisplay = document.getElementById('formulaDisplay');

    // 參數 (比例：10px = 1cm)
    const targetHeightPx = 50; // 5cm 高度差
    let currentHeightPx = targetHeightPx;
    let isPouring = false;
    let pourAnimation;
    let isStoneRemoved = false;

    function updateStep(text) { stepInfo.innerHTML = text; }

    function init() {
        // 恢復初始藍色滿水位
        displacedWater.classList.remove('orange-mode');
        displacedWater.style.transition = 'height 1s ease';
        displacedWater.style.height = `${targetHeightPx}px`;
        currentHeightPx = targetHeightPx;

        // 石頭歸位
        stone.style.transition = 'none'; // 瞬間歸位
        stone.style.bottom = '10px';
        stone.style.opacity = '1';
        stone.style.transform = 'translateZ(0px) rotateY(-20deg)';

        emptyOutline.style.opacity = '0';
        btnAddWater.disabled = true;
        btnRemoveStone.disabled = false;
        formulaDisplay.style.display = 'none';
        isStoneRemoved = false;
        
        updateStep(`觀察初始狀態：<span class="highlight">水 + 石頭 = 20 cm</span> <br><span style="font-size: 0.85em; color: #666;">（💡 提示：滑鼠游標移到容器上，可以切換觀看視角喔！）</span>`);
        
        // 恢復石頭動畫屬性
        setTimeout(() => { stone.style.transition = 'bottom 1.5s ease, opacity 0.5s ease, transform 1.5s ease'; }, 50);
    }

    // 1. 拿出石頭
    function removeStone() {
        btnRemoveStone.disabled = true;
        updateStep(`正在拿出石頭...`);
        
        // 石頭往上飛並往後退
        stone.style.bottom = '350px';
        stone.style.transform = 'translateZ(-100px) rotateY(180deg)';
        stone.style.opacity = '0';
        
        // 水位下降
        setTimeout(() => {
            displacedWater.style.height = '0px';
            updateStep(`拿出石頭後，水位降至 <span class="highlight">15 cm</span>。原本石頭佔用的空間空出來了！`);
        }, 1200);
        
        // 顯示虛線框
        setTimeout(() => {
            emptyOutline.style.opacity = '1';
            btnAddWater.disabled = false;
            isStoneRemoved = true;
            // 準備補水，切換為橘色模式，取消 CSS 過渡讓 JS 接管
            displacedWater.classList.add('orange-mode');
            displacedWater.style.transition = 'none'; 
            currentHeightPx = 0;
        }, 2200);
    }

    // --- 長按加水互動邏輯 ---
    function startPouring(e) {
        if(e.type === 'touchstart') e.preventDefault();
        if (!isStoneRemoved || currentHeightPx >= targetHeightPx) return;
        
        isPouring = true;
        updateStep(`正在補入橘色的水... 請繼續按住填滿空間`);
        lastTime = performance.now();
        pourAnimation = requestAnimationFrame(pourLoop);
    }

    function stopPouring(e) {
        if(e && e.type === 'touchend') e.preventDefault();
        if (!isPouring) return;
        
        isPouring = false;
        cancelAnimationFrame(pourAnimation);

        if (currentHeightPx > 0 && currentHeightPx < targetHeightPx) {
            updateStep(`還沒滿喔！請繼續<span class="highlight">長按按鈕</span>直到填滿虛線框。`);
        }
    }

    let lastTime = 0;
    function pourLoop(time) {
        if (!isPouring) return;
        const deltaTime = time - lastTime;
        lastTime = time;

        // 調整加水速度 (每幀增加的 px)
        currentHeightPx += 0.04 * deltaTime; 

        if (currentHeightPx >= targetHeightPx) {
            currentHeightPx = targetHeightPx;
            displacedWater.style.height = `${currentHeightPx}px`;
            stopPouring();
            finishPouring();
            return;
        }

        displacedWater.style.height = `${currentHeightPx}px`;
        pourAnimation = requestAnimationFrame(pourLoop);
    }

    function finishPouring() {
        btnAddWater.disabled = true;
        emptyOutline.style.opacity = '0'; // 填滿後隱藏虛線框
        updateStep(`立體的橘色水塊，剛好填滿了石頭的空間！`);
        
        formulaDisplay.style.display = 'block';
        document.getElementById('formula1').innerHTML = `補進去的水體積 = 底部長 <span class="highlight">20</span> × 寬 <span class="highlight">10</span> × 高度差 (<span class="highlight">20 - 15</span>) cm`;
        
        setTimeout(() => {
            document.getElementById('formula2').innerHTML = `補進去的水體積 = 20 × 10 × 5 = <span class="highlight">1000 cm³</span>`;
        }, 1000);

        setTimeout(() => {
            document.getElementById('finalResult').innerHTML = `你看見了嗎？橘色水塊的形狀雖然跟石頭不一樣，但它們佔用的「空間大小」是一樣的。<br/><strong>所以，石頭的體積 = 1000 cm³。</strong>`;
        }, 2500);
    }

    // 綁定按鈕事件
    btnAddWater.addEventListener('mousedown', startPouring);
    btnAddWater.addEventListener('mouseup', stopPouring);
    btnAddWater.addEventListener('mouseleave', stopPouring);
    btnAddWater.addEventListener('touchstart', startPouring, {passive: false});
    btnAddWater.addEventListener('touchend', stopPouring, {passive: false});
    btnAddWater.addEventListener('touchcancel', stopPouring, {passive: false});

    // 啟動
    init();
</script>

</body>
</html>
